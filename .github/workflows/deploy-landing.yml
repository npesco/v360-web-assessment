name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Landing page ──────────────────────────────────────────────────────
      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Build landing (static export)
        working-directory: landing
        run: npm run build
        env:
          BASE_PATH: /v360-web-assessment

      # ── Dashboard ─────────────────────────────────────────────────────────
      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard (static export)
        working-directory: dashboard
        run: npm run build
        env:
          BASE_PATH: /v360-web-assessment/dashboard

      # ── Combine outputs ───────────────────────────────────────────────────
      - name: Combine outputs
        run: |
          mkdir -p combined
          cp -r landing/out/. combined/
          mkdir -p combined/dashboard
          cp -r dashboard/out/. combined/dashboard/

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: combined
          branch: gh-pages
          clean: true
